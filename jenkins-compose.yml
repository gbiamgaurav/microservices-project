version: '3.8'

services:
  # Jenkins server
  jenkins:
    image: jenkins/jenkins:lts
    container_name: microservices-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - JENKINS_OPTS=--httpPort=8080
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker
      - /usr/bin/docker:/usr/bin/docker
    restart: unless-stopped
    networks:
      - jenkins-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SonarQube for code quality (optional)
  sonarqube:
    image: sonarqube:latest
    container_name: microservices-sonarqube
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLED=true
    ports:
      - "9000:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
    networks:
      - jenkins-network
    restart: unless-stopped

volumes:
  jenkins-data:
    driver: local
  sonarqube-data:
    driver: local
  sonarqube-extensions:
    driver: local

networks:
  jenkins-network:
    driver: bridge
