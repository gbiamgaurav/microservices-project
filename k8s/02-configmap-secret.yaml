apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: microservices
data:
  FLASK_ENV: "production"
  VITE_API_URL: "http://api-gateway:5000"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: microservices
type: Opaque
stringData:
  SECRET_KEY: "your-secret-key-change-in-production-12345"
