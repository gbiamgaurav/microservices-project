name: CI/CD Pipeline

# Trigger on push to main branch
on:
  push:
    branches: [main, develop]
    paths:
      - 'microservices/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_AUTH: ghcr.io/${{ github.repository }}/auth-service
  IMAGE_NAME_USER: ghcr.io/${{ github.repository }}/user-service
  IMAGE_NAME_PRODUCT: ghcr.io/${{ github.repository }}/product-service
  IMAGE_NAME_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ==================== BUILD ====================
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "tag=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./microservices/auth-service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_AUTH }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME_AUTH }}:latest

      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./microservices/user-service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_USER }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME_USER }}:latest

      - name: Build and push Product Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./microservices/product-service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_PRODUCT }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME_PRODUCT }}:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_FRONTEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME_FRONTEND }}:latest

  # ==================== TEST ====================
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (Auth Service)
        run: |
          pip install -r microservices/auth-service/requirements.txt

      - name: Run tests (Auth Service)
        run: |
          python -m pytest microservices/auth-service/ -v || true

      - name: Install dependencies (User Service)
        run: |
          pip install -r microservices/user-service/requirements.txt

      - name: Run tests (User Service)
        run: |
          python -m pytest microservices/user-service/ -v || true

      - name: Install dependencies (Product Service)
        run: |
          pip install -r microservices/product-service/requirements.txt

      - name: Run tests (Product Service)
        run: |
          python -m pytest microservices/product-service/ -v || true

  # ==================== SECURITY SCAN ====================
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ env.IMAGE_NAME_AUTH }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ==================== DEPLOY TO DOCKER COMPOSE ====================
  deploy-docker-compose:
    runs-on: ubuntu-latest
    needs: [build, test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /app/microservices-project
            
            # Pull latest code
            git pull origin main
            
            # Stop current containers
            docker compose down
            
            # Pull latest images from registry
            docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
            docker compose pull
            
            # Start new containers
            docker compose up -d
            
            # Wait for services to be healthy
            sleep 10
            
            # Check health
            curl http://localhost:5001/health || echo "Auth service health check"
            curl http://localhost:5002/health || echo "User service health check"
            curl http://localhost:5003/health || echo "Product service health check"
            
            echo "✅ Deployment completed successfully"

      - name: Verify deployment
        run: |
          sleep 5
          curl -f http://${{ secrets.DEPLOY_HOST }}:3000 || echo "Frontend available"

      - name: Slack notification - Success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status*: ✅ Success\n*Branch*: ${{ github.ref }}\n*Commit*: ${{ github.sha }}\n*Author*: ${{ github.actor }}\n*Server*: ${{ secrets.DEPLOY_HOST }}"
                  }
                }
              ]
            }

      - name: Slack notification - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status*: ❌ Failed\n*Branch*: ${{ github.ref }}\n*Commit*: ${{ github.sha }}\n*Author*: ${{ github.actor }}"
                  }
                }
              ]
            }
